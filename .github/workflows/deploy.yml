name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  UNIT: bot
  PLIST_FILE: bot.plist
  WORKDIR: /Users/narumi/apps/bot
  PLIST_DIR: /Users/narumi/Library/LaunchAgents

jobs:
  deploy:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Sync code to runtime
        shell: bash
        run: |
          rsync -a --delete \
            --filter=':- .gitignore' \
            --exclude='.venv/' \
            ${{ github.workspace }}/ ${{ env.WORKDIR }}/
      - name: Stop and disable service
        shell: bash
        run: |
          set -euo pipefail
          if launchctl list | grep -q "${{ env.UNIT }}"; then
            launchctl stop "${{ env.UNIT }}"
            launchctl unload "${{ env.PLIST_DIR }}/${{ env.PLIST_FILE }}"
          else
            echo "Service ${{ env.UNIT }} is not loaded; skip stop/unload."
          fi
      - name: Create dotenv
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          umask 077
          cat <<'EOF' > .env
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          BOT_WHITELIST=${{ vars.BOT_WHITELIST }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL=${{ vars.OPENAI_MODEL }}
          LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}
          LOGFIRE_ENVIRONMENT=prod
          FFMPEG_PATH=/opt/homebrew/bin/ffmpeg
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}
          CACHE_URL=${{ secrets.CACHE_URL }}
          EOF
          chmod 600 .env
      - name: Preparing environment
        working-directory: ${{ env.WORKDIR }}
        run: |
          cp ${{ env.PLIST_FILE }} ${{ env.PLIST_DIR }}
          # uv venv --clear --managed-python --python ${{ matrix.python-version }}
          rm -rf .venv
          uv sync
          uv run playwright install chromium
      - name: Start service
        shell: bash
        run: |
          set -euo pipefail
          launchctl load -w "${{ env.PLIST_DIR }}/${{ env.PLIST_FILE }}"
          launchctl start "${{ env.UNIT }}"
